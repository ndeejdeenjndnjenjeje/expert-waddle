<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f6fa;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .link {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    a {
      color: #4f46e5;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🔗 Dashboard</h2>

  <a href="/logout">Logout</a>

  <!-- CREATE -->
  <div class="card">
    <h3>Create Short Link</h3>

    <form method="POST" action="/api/shorten">
      <input name="url" placeholder="https://example.com" required>
      <input name="custom" placeholder="custom alias (optional)">
      <input name="expiresDays" placeholder="expires in days (optional)">
      <button>Create</button>
    </form>
  </div>

  <!-- LIST -->
  <div class="card">
    <h3>Your Links</h3>
    <div id="list"></div>
  </div>

</div>

<script>
fetch("/api/links")
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(l => {
      const div = document.createElement("div");

      div.className = "link";
      div.innerHTML = `
        <b>/go/${l.code}</b><br>
        ${l.url}<br>
        ${l.expiresAt ? "⏳ expires" : "♾️ no expiry"}
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>
