<!DOCTYPE html>
<html>
<head>
  <title>Public Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🌐 Public Dashboard</h2>

<div id="list"></div>

<script>
fetch("/api/public-links")
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(l => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <a href="/go/${l.code}" target="_blank">
          /go/${l.code}
        </a>
        <br>
        ${l.url}
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>
