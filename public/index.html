<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    .sidebar {
      width: 200px;
      height: 100vh;
      background: #111;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .main {
      margin-left: 220px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    input, button {
      padding: 8px;
      margin: 5px 0;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <h2>Admin</h2>
    <a href="/logout" style="color:white;">Logout</a>
  </div>

  <div class="main">
    <h1>Dashboard</h1>

    <div class="card">
      <h3>Add Link</h3>
      <form method="POST" action="/api/add">
        <input name="name" placeholder="Name" required><br>
        <input name="url" placeholder="URL" required><br>
        <button>Add</button>
      </form>
    </div>

    <div class="card">
      <h3>Links</h3>
      <ul id="list"></ul>
    </div>
  </div>

  <script>
    fetch("/api/links")
      .then(r => r.json())
      .then(data => {
        const ul = document.getElementById("list");

        data.forEach((l, i) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <a href="${l.url}" target="_blank">${l.name}</a>
            <form method="POST" action="/api/delete" style="display:inline">
              <input type="hidden" name="index" value="${i}">
              <button>Delete</button>
            </form>
          `;
          ul.appendChild(li);
        });
      });
  </script>
</body>
</html>
